<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Functions Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    button {
      padding: 10px 15px;
      margin: 10px 5px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: #eee;
      border-radius: 5px;
      min-height: 50px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>JavaScript Functions</h1>


    <button onclick="withoutParameter()">Function Without Parameter
</button>

    <button onclick="withParameter('Soorya', 18)">
      Function With Parameter
    </button>

    <button onclick="callArrowFunction()">
      Arrow Function
    </button>

    <div id="output">Output will appear here...</div>
  </div>

  <script>
   
    function withoutParameter() {
      document.getElementById("output").innerHTML =
        "Function without parameters.";
    }

    
    function withParameter(name, age) {
      document.getElementById("output").innerHTML =
        "Name: " + name + "<br>Age: " + age;
    }

   
    const arrowFunction = () => {
      return "This message is from an Arrow Function.";
    };

    function callArrowFunction() {
      document.getElementById("output").innerHTML =
        arrowFunction();
    }
  </script>

</body>
</html>
